<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI双线编年史 | 世界AI · 中国AI 发展全览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #03050b;
            font-family: 'Segoe UI', 'Poppins', 'Inter', 'Orbitron', monospace;
            color: #eef5ff;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* 科技动态背景 */
        .tech-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 10%, #0a0f1f, #010101);
        }
        .tech-bg::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 45px 45px;
            pointer-events: none;
        }
        .tech-bg::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.02) 0%, transparent 70%);
            animation: rotateSlow 30s linear infinite;
            pointer-events: none;
        }
        @keyframes rotateSlow {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }

        /* ========= 初始超大Logo区域 ========= */
        .hero-logo-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 20;
            background: radial-gradient(circle at center, rgba(0,20,40,0.4) 0%, transparent 80%);
        }
        .giant-logo {
            text-align: center;
            cursor: pointer;
            animation: logoFloat 3s infinite ease-in-out;
        }
        .giant-logo .logo-icon {
            font-size: 18rem;
            filter: drop-shadow(0 0 30px #0ff);
            animation: iconGlow 2s infinite alternate;
        }
        .giant-logo .logo-text {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #fff, #0ff, #a88eff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0,255,255,0.5);
            margin-top: 1rem;
        }
        .giant-logo .logo-sub {
            font-size: 1rem;
            color: #8ae2ff;
            letter-spacing: 2px;
            margin-top: 0.5rem;
        }
        @keyframes logoFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        @keyframes iconGlow {
            0% { filter: drop-shadow(0 0 15px #0ff); }
            100% { filter: drop-shadow(0 0 45px #0ff); }
        }

        .main-title {
            font-size: 3.2rem;
            margin-top: 2rem;
            background: linear-gradient(135deg, #fff, #aaf0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
        }
        .scroll-tip {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #0ff;
            font-size: 1rem;
            animation: bounce 1.8s infinite;
            z-index: 25;
            font-family: monospace;
        }
        .scroll-tip span {
            font-size: 2rem;
        }
        @keyframes bounce {
            0%,100%{ transform: translateX(-50%) translateY(0); opacity: 0.6;}
            50%{ transform: translateX(-50%) translateY(12px); opacity: 1;}
        }

        /* 固定顶栏 (初始隐藏，滚动后显示) */
        .sticky-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(3, 5, 15, 0.92);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.4);
            z-index: 100;
            padding: 12px 28px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            transform: translateY(-100%);
            transition: transform 0.4s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .sticky-header.visible {
            transform: translateY(0);
        }
        .small-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 30, 50, 0.6);
            padding: 5px 18px 5px 14px;
            border-radius: 50px;
            border-right: 2px solid #0ff;
        }
        .small-logo .icon {
            font-size: 2.4rem;
            filter: drop-shadow(0 0 5px #0ff);
        }
        .small-logo .text {
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg,#fff,#0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sticky-title {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #eef5ff, #0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            white-space: nowrap;
        }
        /* 指示栏 (仅在滚动后可见) */
        .indicator-bar {
            display: flex;
            gap: 28px;
            margin-left: auto;
            margin-right: 30px;
        }
        .indicator {
            font-size: 1.1rem;
            font-weight: 600;
            padding: 8px 22px;
            border-radius: 40px;
            background: rgba(0, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(0,255,255,0.3);
            color: #bbf0ff;
        }
        .indicator.active {
            background: #0ff;
            color: #010101;
            box-shadow: 0 0 20px #0ff;
            border-color: #0ff;
            font-weight: bold;
        }
        .indicator:hover {
            background: rgba(0,255,255,0.3);
            transform: scale(1.02);
        }

        /* 主内容容器 */
        .content-wrapper {
            position: relative;
            z-index: 10;
            padding-top: 20px;
        }
        .timeline-panel {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 5rem;
            transition: all 0.4s;
        }

        /* 双面板切换动画 */
        .panel {
            width: 100%;
            transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.3, 1, 0.2, 1);
        }
        .panel.active-panel {
            display: block;
            animation: panelEnter 0.55s ease-out;
        }
        .panel.hidden-panel {
            display: none;
        }

        @keyframes panelEnter {
            0% { opacity: 0; transform: translateX(30px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        /* 退出动画: 左右移出 */
        .exit-left {
            animation: slideOutLeft 0.5s forwards !important;
        }
        .exit-right {
            animation: slideOutRight 0.5s forwards !important;
        }
        @keyframes slideOutLeft {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(-100%); opacity: 0; display: none; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; display: none; }
        }

        /* 时间轴样式 */
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 20px;
            bottom: 20px;
            width: 2px;
            background: linear-gradient(to bottom, #0ff, #a0f, #0ff);
            box-shadow: 0 0 6px #0ff;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 2.8rem;
            padding-left: 35px;
            transition: all 0.2s;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2px;
            top: 8px;
            width: 14px;
            height: 14px;
            background: #0ff;
            border-radius: 50%;
            box-shadow: 0 0 12px #0ff;
            border: 2px solid #fff;
        }
        .card {
            background: rgba(12, 20, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.2rem 1.8rem;
            border: 1px solid rgba(0, 255, 255, 0.35);
            transition: 0.25s;
        }
        .card:hover {
            transform: translateX(6px);
            border-color: #0ff;
            box-shadow: 0 10px 28px rgba(0, 255, 255, 0.2);
        }
        .date {
            font-family: monospace;
            font-size: 1rem;
            font-weight: 600;
            color: #0ff;
            margin-bottom: 0.4rem;
        }
        .event-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0.2rem 0 0.5rem;
            background: linear-gradient(120deg, #fff, #b0e0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .desc {
            font-size: 0.95rem;
            color: #cfecff;
            margin: 0.6rem 0;
        }
        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            font-size: 0.8rem;
            border-top: 1px dashed rgba(0,255,255,0.3);
            padding-top: 10px;
        }
        .meta span {
            background: rgba(0, 180, 255, 0.15);
            padding: 4px 12px;
            border-radius: 40px;
        }

        @media (max-width: 780px) {
            .giant-logo .logo-icon { font-size: 8rem; }
            .giant-logo .logo-text { font-size: 1.8rem; }
            .main-title { font-size: 1.8rem; }
            .sticky-header { flex-direction: column; align-items: flex-start; gap: 8px; padding: 12px; }
            .indicator-bar { margin-left: 0; margin-top: 6px; }
            .sticky-title { font-size: 1.2rem; white-space: normal; }
            .small-logo .icon { font-size: 1.8rem; }
        }
        .footer {
            text-align: center;
            padding: 2rem;
            color: #6c86a0;
            border-top: 1px solid rgba(0,255,255,0.2);
        }
    </style>
</head>

        { date:"2023年12月", title:"智谱AI GLM-4", desc:"智谱AI发布GLM-4，性能达到GPT-4水平，成为国产头部基座模型。", person:"唐杰团队", country:"中国", org:"智谱AI" },
        { date:"2024年2月", title:"月之暗面Kimi智能助手", desc:"杨植麟团队开发Kimi，支持200万上下文，国产大模型应用爆款。", person:"杨植麟", country:"中国", org:"月之暗面科技" },
        { date:"2024年7月", title:"《人工智能法》立法启动", desc:"中国启动AI立法，针对生成式AI与安全监管草案征求意见。", person:"网信办等", country:"中国", org:"中国政府" },
        { date:"2024年10月", title:"科大讯飞星火认知大模型4.0", desc:"星火4.0在数学、代码能力全面升级，对标GPT-4 Turbo。", person:"刘庆峰团队", country:"中国", org:"科大讯飞" },
        { date:"2025年1月", title:"DeepSeek-V3发布", desc:"深度求索DeepSeek-V3开源模型，训练成本极低，性能比肩顶尖闭源模型，轰动全球。", person:"梁文锋团队", country:"中国", org:"深度求索(DeepSeek)" },
        { date:"2025年6月", title:"华为昇腾910C芯片量产", desc:"国产AI算力旗舰昇腾910C，支撑大规模模型训练。", person:"华为海思团队", country:"中国", org:"华为" },
        { date:"2025年9月", title:"清华&智谱 多模态智能体AutoGLM", desc:"首个能自主操作手机/电脑的智能体，实现AGI工具链。", person:"智谱AI+清华", country:"中国", org:"智谱AI/清华" },
        { date:"2026年2月", title:"中国通用人工智能(AGI)安全标准发布", desc:"中国发布全球首套AGI安全与对齐标准草案，引领治理。", person:"中国信通院等", country:"中国", org:"工信部" },
        { date:"2026年3月", title:"百川智能Baichuan-AGI预览版", desc:"百川智能发布具备自主进化能力的AGI原型，王小川团队宣布2026商用落地。", person:"王小川团队", country:"中国", org:"百川智能" }
    ];

    function renderWorld() {
        const container = document.getElementById("worldTimeline");
        if(!container) return;
        container.innerHTML = worldMilestones.map(m => `
            <div class="timeline-item">
                <div class="card">
                    <div class="date">📅 ${m.date}</div>
                    <div class="event-title">${m.title}</div>
                    <div class="desc">${m.desc}</div>
                    <div class="meta"><span>👤 ${m.person}</span><span>🌍 ${m.country}</span><span>🏢 ${m.org}</span></div>
                </div>
            </div>
        `).join('');
    }

    function renderChina() {
        const container = document.getElementById("chinaTimeline");
        if(!container) return;
        container.innerHTML = chinaMilestones.map(m => `
            <div class="timeline-item">
                <div class="card">
                    <div class="date">📅 ${m.date}</div>
                    <div class="event-title">${m.title}</div>
                    <div class="desc">${m.desc}</div>
                    <div class="meta"><span>👤 ${m.person}</span><span>🇨🇳 ${m.country}</span><span>🏢 ${m.org}</span></div>
                </div>
            </div>
        `).join('');
    }

    let currentPanel = "world";
    const worldPanelDiv = document.getElementById("worldPanel");
    const chinaPanelDiv = document.getElementById("chinaPanel");
    const indicators = document.querySelectorAll(".indicator");
    const stickyMainTitle = document.getElementById("stickyMainTitle");

    function switchPanel(target) {
        if(target === currentPanel) return;
        const leavingPanel = currentPanel === "world" ? worldPanelDiv : chinaPanelDiv;
        const enteringPanel = target === "world" ? worldPanelDiv : chinaPanelDiv;
        const direction = (currentPanel === "world" && target === "china") ? "left" : "right";
        
        leavingPanel.classList.add(direction === "left" ? "exit-left" : "exit-right");
        leavingPanel.addEventListener('animationend', function onEnd() {
            leavingPanel.classList.remove("exit-left", "exit-right");
            leavingPanel.classList.add("hidden-panel");
            enteringPanel.classList.remove("hidden-panel");
            enteringPanel.classList.add("active-panel");
            leavingPanel.removeEventListener('animationend', onEnd);
        }, { once: true });
        
        indicators.forEach(ind => {
            if(ind.dataset.panel === target) ind.classList.add("active");
            else ind.classList.remove("active");
        });
        stickyMainTitle.innerText = target === "world" ? "人工智能发展全历程 · 世界AI" : "人工智能发展全历程 · 中国AI";
        currentPanel = target;
    }

    // 滚动控制
    const heroSection = document.getElementById("heroSection");
    const stickyHeader = document.getElementById("stickyHeader");
    let headerVisible = false;

    window.addEventListener("scroll", () => {
        const scrollY = window.scrollY;
        if(scrollY > 120) {
            if(!headerVisible) {
                stickyHeader.classList.add("visible");
                headerVisible = true;
            }
            heroSection.style.opacity = "0";
            heroSection.style.transform = "scale(0.7) translateY(-80px)";
            heroSection.style.position = "fixed";
            heroSection.style.top = "0";
            heroSection.style.left = "0";
            heroSection.style.width = "auto";
            heroSection.style.minHeight = "auto";
            heroSection.style.padding = "0";
            heroSection.style.margin = "12px 0 0 20px";
            heroSection.style.background = "transparent";
            heroSection.style.zIndex = "101";
            heroSection.style.pointerEvents = "none";
            document.querySelector(".giant-logo .logo-icon").style.fontSize = "2.4rem";
            document.querySelector(".giant-logo .logo-text").style.fontSize = "0.9rem";
            document.querySelector(".giant-logo .logo-sub").style.display = "none";
            document.querySelector(".main-title").style.display = "none";
            document.querySelector(".scroll-tip").style.display = "none";
        } else {
            if(headerVisible) {
                stickyHeader.classList.remove("visible");
                headerVisible = false;
            }
            heroSection.style.opacity = "1";
            heroSection.style.transform = "";
            heroSection.style.position = "relative";
            heroSection.style.width = "100%";
            heroSection.style.minHeight = "100vh";
            heroSection.style.padding = "";
            heroSection.style.margin = "";
            heroSection.style.background = "";
            heroSection.style.zIndex = "20";
            heroSection.style.pointerEvents = "auto";
            document.querySelector(".giant-logo .logo-icon").style.fontSize = "18rem";
            document.querySelector(".giant-logo .logo-text").style.fontSize = "3.5rem";
            document.querySelector(".giant-logo .logo-sub").style.display = "block";
            document.querySelector(".main-title").style.display = "block";
            document.querySelector(".scroll-tip").style.display = "flex";
        }
    });

    indicators.forEach(ind => {
        ind.addEventListener("click", () => {
            const targetPanel = ind.dataset.panel;
            if(targetPanel === "world") switchPanel("world");
            else if(targetPanel === "china") switchPanel("china");
        });
    });

    renderWorld();
    renderChina();
    stickyMainTitle.innerText = "人工智能发展全历程 · 世界AI";
</script>
</body>
</html>
